apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-d-batch-gateway-operator
spec:
  template:
    spec:
      containers:
      - name: manager
        volumeMounts:
        - mountPath: /tmp/k8s-metrics-server/metrics-certs
          name: metrics-certs
          readOnly: true
      volumes:
      - name: metrics-certs
        secret:
          secretName: llm-d-batch-gateway-operator-metrics-tls
          optional: true

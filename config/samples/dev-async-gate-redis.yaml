apiVersion: batch.llm-d.ai/v1alpha1
kind: LLMBatchGateway
metadata:
  name: batch-gateway-dev
spec:
  secretRef:
    name: batch-gateway-secrets
  dbBackend: postgresql
  fileStorage:
    s3:
      bucket: llm-d-batch-gateway
      region: us-east-1
      endpoint: http://minio.default.svc.cluster.local:9000
      accessKeyId: minioadmin
      usePathStyle: true
      autoCreateBucket: true
  apiServer:
    replicas: 1
    imagePullPolicy: IfNotPresent
  gc:
    interval: 30m
    imagePullPolicy: IfNotPresent
  processor:
    replicas: 1
    imagePullPolicy: IfNotPresent
    dispatchMode: async
    modelGateways:
      sim-model:
        inferencePoolName: sim-pool
    asyncConfig:
      replicas: 1
      values:
        messageQueueImpl: redis-sortedset
        concurrency: 1
        drainTimeout: 2m
        redis:
          enabled: true
          requestPathURL: /v1/completions
          pollIntervalMs: 500
          batchSize: 10
          queuesConfig:
          - queue_name: "llm-d-async:requests:sim-pool"     # format: llm-d-async:requests:<inferencePoolName> (from processor.modelGateways[].inferencePoolName)
            request_path_url: /v1/completions
            igw_base_url: http://vllm-sim.default.svc.cluster.local:8000
            gate_type: redis
            gate_params:
              address: "redis-master.default.svc.cluster.local:6379"
            worker_pool_id: sim-workers
        workerPools:
        - id: sim-workers
          workers: 4
          gate_type: local-max-concurrency
          gate_params:
            limit: "2"
